<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72" fill="none">
  <!-- University of Glasgow Logo -->
  <!-- University Blue: #011451 -->

  <!-- Shield/Crest outline -->
  <g fill="#011451">
    <!-- Main shield shape -->
    <path d="M4 4 L4 44 Q4 56 18 64 L28 68 L38 64 Q52 56 52 44 L52 4 Z" stroke="#011451" stroke-width="2" fill="none"/>

    <!-- Cross dividers -->
    <line x1="28" y1="4" x2="28" y2="68" stroke="#011451" stroke-width="1.5"/>
    <line x1="4" y1="36" x2="52" y2="36" stroke="#011451" stroke-width="1.5"/>

    <!-- Top left quadrant - Book -->
    <rect x="10" y="14" width="12" height="16" rx="1" fill="none" stroke="#011451" stroke-width="1"/>
    <line x1="16" y1="14" x2="16" y2="30" stroke="#011451" stroke-width="0.75"/>

    <!-- Top right quadrant - Tree -->
    <circle cx="40" cy="18" r="6" fill="none" stroke="#011451" stroke-width="1"/>
    <line x1="40" y1="24" x2="40" y2="32" stroke="#011451" stroke-width="1"/>

    <!-- Bottom left quadrant - Bell -->
    <path d="M12 46 Q12 42 16 42 Q20 42 20 46 L20 52 L12 52 Z" fill="none" stroke="#011451" stroke-width="1"/>
    <circle cx="16" cy="54" r="2" fill="#011451"/>

    <!-- Bottom right quadrant - Bird -->
    <path d="M36 48 Q40 44 44 48 L44 52 Q40 56 36 52 Z" fill="none" stroke="#011451" stroke-width="1"/>
  </g>

  <!-- University text -->
  <text x="64" y="32" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" letter-spacing="0.5" fill="#011451">UNIVERSITY</text>
  <text x="64" y="52" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="400" letter-spacing="0.5" fill="#011451">of GLASGOW</text>
</svg>
